<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comisiones del Senado de la Nación Argentina — 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --blue:#1B5EA2; --blue-mid:#2E75B6; --blue-light:#D6E4F0;
  --gray-text:#4A4A4A; --gray-bg:#F5F7FA; --white:#FFFFFF;
  --border:#E2E8F0;
  --changed-bg:#FFF3CD; --changed-txt:#7A5200;
  --vacant-bg:#F8F9FA; --vacant-txt:#9CA3AF;
  --over:#FEE2E2; --over-txt:#991B1B;
  --under:#D1FAE5; --under-txt:#065F46;
  --exact:#DBEAFE; --exact-txt:#1E40AF;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',Calibri,sans-serif;background:var(--gray-bg);color:var(--gray-text);min-height:100vh}

/* ── STICKY HEADER ── */
.sticky-header{position:sticky;top:0;z-index:100;background:var(--white);border-top:3px solid var(--blue);border-bottom:1px solid var(--blue-light);box-shadow:0 2px 8px rgba(27,94,162,.08)}
.header-inner{display:flex;align-items:center;gap:12px;padding:0 20px;height:54px;max-width:1700px;margin:0 auto;flex-wrap:wrap}
.header-brand{flex:1;min-width:200px}
.header-brand .sup{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--blue);opacity:.7}
.header-brand .title{font-size:15px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;line-height:1.2}
.header-brand .sub{font-size:10px;color:var(--blue-mid);letter-spacing:1px;text-transform:uppercase}
.controls{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:#9CA3AF;pointer-events:none}
input[type="search"]{height:34px;padding:0 10px 0 30px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:13px;color:var(--gray-text);background:var(--gray-bg);width:220px;outline:none;transition:border-color .15s}
input[type="search"]:focus{border-color:var(--blue);background:var(--white)}
select{height:34px;padding:0 10px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:13px;color:var(--gray-text);background:var(--gray-bg);cursor:pointer;outline:none}
select:focus{border-color:var(--blue)}
.tabs-row{border-top:1px solid var(--blue-light)}
.tabs-inner{display:flex;gap:0;padding:0 20px;max-width:1700px;margin:0 auto}
.tab-btn{height:38px;padding:0 18px;font-family:inherit;font-size:12px;font-weight:500;color:var(--blue-mid);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;transition:color .15s,border-color .15s}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-btn:hover:not(.active){color:var(--blue)}

/* ── STATS ── */
.stats-bar{display:flex;gap:10px;flex-wrap:wrap;padding:12px 20px;max-width:1700px;margin:0 auto}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:8px 16px}
.stat-n{font-size:22px;font-weight:700;color:var(--blue);line-height:1}
.stat-l{font-size:11px;color:#6B7280;margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

/* ── MAIN ── */
main{max-width:1700px;margin:0 auto;padding:16px 20px 60px}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}

/* ── COMMISSION CARD ── */
.com-card{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:box-shadow .15s}
.com-card:hover{box-shadow:0 4px 16px rgba(27,94,162,.1)}
.card-header{background:linear-gradient(135deg,var(--blue) 0%,var(--blue-mid) 100%);padding:12px 14px 10px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-tipo{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:3px}
.card-name{font-size:13px;font-weight:600;color:#fff;line-height:1.3}
.card-header-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.card-count{font-size:11px;font-weight:700;color:rgba(255,255,255,.9);background:rgba(255,255,255,.2);border-radius:12px;padding:2px 8px;white-space:nowrap}
.card-hist-btn{font-size:10px;color:rgba(255,255,255,.75);background:none;border:1px solid rgba(255,255,255,.35);border-radius:4px;padding:2px 7px;cursor:pointer;font-family:inherit;white-space:nowrap}
.card-hist-btn:hover{background:rgba(255,255,255,.2);color:#fff}

/* member rows */
.member-list{padding:2px 0}
.member-row{display:flex;align-items:center;padding:5px 12px;border-bottom:1px solid #F1F5F9;font-size:12px;gap:5px}
.member-row:last-child{border-bottom:none}
.member-row.vacant{color:var(--vacant-txt);font-style:italic;background:var(--vacant-bg)}
.bloque-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.member-name{flex:1;color:var(--gray-text)}
.member-role{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;cursor:pointer;flex-shrink:0;border:none;font-family:inherit}
.role-pres{background:#DBEAFE;color:#1E40AF}
.role-vice{background:#F3E8FF;color:#7C3AED}
.role-secr{background:#D1FAE5;color:#065F46}
.role-empty{font-size:9px;color:#D1D5DB;cursor:pointer;flex-shrink:0;background:none;border:none;font-family:inherit;padding:2px 4px}
.role-empty:hover{color:#9CA3AF}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;cursor:pointer;white-space:nowrap;font-weight:500;border:none;font-family:inherit;flex-shrink:0}
.badge:hover{opacity:.8}
.badge.changed{background:var(--changed-bg);color:var(--changed-txt);cursor:pointer}
.badge.original{background:var(--blue-light);color:var(--blue);cursor:default}
.badge.vacant-badge{background:#E5E7EB;color:#6B7280;cursor:default}

/* ── SENATOR VIEW ── */
#senadorView{display:none}
.senator-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.senator-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.senator-name{font-size:13px;font-weight:600;color:var(--blue);margin-bottom:2px}
.senator-bloque-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;margin-bottom:6px;font-weight:500}
.senator-chips{display:flex;flex-wrap:wrap;gap:3px}
.chip{font-size:11px;padding:3px 8px;border-radius:10px;background:var(--blue-light);color:var(--blue);cursor:pointer;font-weight:500;border:none;font-family:inherit}
.chip:hover{background:var(--blue);color:#fff}
.senator-count{font-size:11px;color:#9CA3AF;margin-top:5px}

/* ── REPRESENTACIÓN VIEW ── */
#reprView{display:none}
.repr-section-title{font-size:14px;font-weight:600;color:var(--blue);margin:20px 0 10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--blue-light);padding-bottom:6px}
.repr-table-wrap{overflow-x:auto;margin-bottom:24px;-webkit-overflow-scrolling:touch}
table.repr{width:100%;border-collapse:collapse;font-size:12px}
table.repr th{background:var(--blue);color:#fff;padding:8px 12px;text-align:left;font-weight:600;font-size:11px;letter-spacing:.3px;white-space:nowrap}
table.repr th.num{text-align:center}
table.repr td{padding:7px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
table.repr td.num{text-align:center;font-weight:500}
table.repr tr:hover td{background:#F8FAFF}
.bloque-name-cell{display:flex;align-items:center;gap:6px}
.blq-dot-table{width:11px;height:11px;border-radius:50%;flex-shrink:0}

/* cross table */
.cross-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:24px}
.cross-table{border-collapse:collapse;font-size:11px}
.cross-table thead tr{vertical-align:bottom}
.cross-table th.blq-col{text-align:left;padding:8px 12px 8px 12px;background:var(--blue);color:#fff;font-size:11px;white-space:nowrap;position:sticky;left:0;z-index:3;min-width:140px;vertical-align:bottom}
.cross-table th.com-col{background:var(--blue);color:#fff;padding:0 4px 8px 4px;width:34px;min-width:34px;max-width:34px;vertical-align:bottom;text-align:center}
.cross-table th.com-col span{display:block;writing-mode:vertical-rl;transform:rotate(180deg);font-size:10px;font-weight:500;line-height:1;white-space:nowrap;max-height:110px;overflow:hidden}
.cross-table td.blq-name{padding:5px 10px;white-space:nowrap;font-size:11px;font-weight:500;border-bottom:1px solid var(--border);position:sticky;left:0;z-index:1;border-right:1px solid var(--border)}
.cross-table td.val{text-align:center;padding:5px 4px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);font-size:12px;width:34px;min-width:34px;max-width:34px}

/* resumen table mobile cards */
@media(max-width:600px){
  .header-inner{height:auto;padding:10px 14px;gap:8px}
  input[type="search"]{width:100%}
  main{padding:12px 12px 60px}
  .stats-bar{padding:10px 12px}
  .tabs-inner{overflow-x:auto;padding:0 12px}
  .tab-btn{padding:0 12px;font-size:11px}
  table.repr{font-size:11px;min-width:340px}
  table.repr th,table.repr td{padding:6px 8px}
  .repr-section-title{font-size:13px}
  .cross-table th.blq-col{min-width:110px;font-size:10px;padding:8px 8px}
  .cross-table td.blq-name{min-width:110px;font-size:10px;padding:5px 8px}
  .cross-table th.com-col span{font-size:9px;max-height:90px}
  .cross-table th.com-col{width:28px;min-width:28px;max-width:28px}
  .cross-table td.val{width:28px;min-width:28px;max-width:28px;font-size:11px}
}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(15,30,60,.4);backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--white);border-radius:12px;border:1px solid var(--border);width:100%;max-width:540px;max-height:80vh;overflow-y:auto;padding:22px;box-shadow:0 20px 60px rgba(27,94,162,.15)}
.modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.modal-title{font-size:14px;font-weight:700;color:var(--blue);line-height:1.3;flex:1}
.modal-close{background:none;border:none;cursor:pointer;font-size:22px;color:#9CA3AF;padding:0 0 0 10px}
.modal-close:hover{color:var(--blue)}
.hist-entry{border-left:3px solid var(--blue-mid);padding:8px 0 8px 14px;margin-bottom:8px}
.hist-dpp{font-size:11px;font-weight:700;color:var(--blue)}
.hist-date{font-size:11px;color:#9CA3AF;margin-left:5px}
.hist-change{font-size:12px;color:var(--gray-text);margin-top:3px}
.hist-label{display:inline-block;font-size:10px;padding:2px 6px;border-radius:3px;font-weight:600;margin-right:3px;text-transform:uppercase}
.hl-add{background:#D1FAE5;color:#065F46}
.hl-replace{background:var(--changed-bg);color:var(--changed-txt)}
.hl-remove{background:#FEE2E2;color:#991B1B}
.hl-rewrite{background:var(--blue-light);color:var(--blue)}
.no-hist{font-size:13px;color:#9CA3AF;text-align:center;padding:14px 0}

/* role modal */
.role-select-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
.role-btn{padding:11px 8px;border-radius:8px;border:2px solid var(--border);cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;text-align:center;transition:all .15s}
.role-btn.pres{border-color:#3B82F6;background:#DBEAFE;color:#1E40AF}
.role-btn.vice{border-color:#A855F7;background:#F3E8FF;color:#7C3AED}
.role-btn.secr{border-color:#22C55E;background:#D1FAE5;color:#065F46}
.role-btn.clear{border-color:#E5E7EB;background:#F9FAFB;color:#6B7280}
.role-btn:hover{opacity:.8}

.empty-state{text-align:center;padding:50px 20px;color:#9CA3AF;font-size:14px}
</style>
</head>
<body>

<div class="sticky-header">
  <div class="header-inner">
    <div class="header-brand">
      <span class="sup">Senado de la Nación Argentina</span>
      <span class="title" style="display:block">Prosecretaría Parlamentaria</span>
      <span class="sub">Integración de Comisiones · Período 2026</span>
    </div>
    <div class="controls">
      <div class="search-wrap">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd"/></svg>
        <input type="search" id="searchBox" placeholder="Buscar comisión o senador..." oninput="renderAll()">
      </div>
      <select id="filterBloque" onchange="renderAll()">
        <option value="all">Todos los bloques</option>
      </select>
      <select id="filterChanges" onchange="renderAll()">
        <option value="all">Todos los miembros</option>
        <option value="changed">Con movimientos DPP</option>
        <option value="vacant">Con vacantes</option>
      </select>
    </div>
  </div>
  <div class="tabs-row">
    <div class="tabs-inner">
      <button class="tab-btn active" onclick="setView('comisiones',this)">Por comisión</button>
      <button class="tab-btn" onclick="setView('senadores',this)">Por senador/a</button>
      <button class="tab-btn" onclick="setView('repr',this)">Representación por bloques</button>
    </div>
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>

<main>
  <div id="comisionView"><div class="grid" id="grid"></div></div>
  <div id="senadorView" style="display:none"><div class="senator-grid" id="senatorGrid"></div></div>
  <div id="reprView" style="display:none"></div>
</main>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-box" id="modalBox">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="modalContent"></div>
  </div>
</div>

  const k=getRoleKey(com,senator);
  if(!role) delete ROLES[k]; else ROLES[k]=role;
  saveRoles();
}

];

// ════════════════════════════════════════════
//  BUILD STATE  (FIX 2: normalize on ingest)
// ════════════════════════════════════════════
const STATE = {};
(function buildState(){
  const rewrites = {};
  for(const c of RAW_CHANGES){
    // normalize names before processing
    if(c.senador)   c.senador   = normalizeName(c.senador);
    if(c.reemplaza) c.reemplaza = normalizeName(c.reemplaza);
    if(!STATE[c.comision]) STATE[c.comision]=[];
    const com = STATE[c.comision];
    if(c.tipo==='add'){
      if(!com.find(m=>m.name===c.senador)) com.push({name:c.senador,dpp:c.dpp,changed:true});
    } else if(c.tipo==='replace'){
      const idx=com.findIndex(m=>m.name===c.reemplaza);
      if(idx>=0) com.splice(idx,1);
      if(!com.find(m=>m.name===c.senador)) com.push({name:c.senador,dpp:c.dpp,changed:true});
    } else if(c.tipo==='remove'){
      const idx=com.findIndex(m=>m.name===c.senador);
      if(idx>=0) com.splice(idx,1);
    } else if(c.tipo==='rewrite'){
      if(!rewrites[c.comision]) rewrites[c.comision]=[];
      rewrites[c.comision].push({name:c.senador,dpp:c.dpp,changed:true});
    }
  }
  for(const [com,members] of Object.entries(rewrites)) STATE[com]=members;
})();

function sortMembersByBloque(members){
  const top=[],bottom=[];
  for(const m of members){
    const b=getSenatorBloque(m.name);
    if(BOTTOM_BLOQUES.includes(b)) bottom.push(m); else top.push(m);
  }
  const cmp=(a,b,fallback=50)=>{
    const ba=getSenatorBloque(a.name),bb=getSenatorBloque(b.name);
    const ia=BLOQUE_ORDER.indexOf(ba),ib=BLOQUE_ORDER.indexOf(bb);
    const oa=ia<0?fallback:ia,ob=ib<0?fallback:ib;
    if(oa!==ob) return oa-ob;
    return a.name.localeCompare(b.name,'es');
  };
  top.sort((a,b)=>cmp(a,b,50));
  bottom.sort((a,b)=>cmp(a,b,98));
  return [...top,...bottom];
}

function getMembers(comision){return sortMembersByBloque(STATE[comision]||[]);}
function getVacantes(nombre){
  const c=ALL_COMISIONES.find(x=>x.nombre===nombre);
  if(!c||!c.cupo) return 0;
  return Math.max(0,c.cupo-(STATE[nombre]||[]).length);
}

// ════════════════════════════════════════════
//  POPULATE BLOQUE FILTER
// ════════════════════════════════════════════
(function(){
  const sel=document.getElementById('filterBloque');
  Object.keys(BLOQUE_TOTALS).sort((a,b)=>BLOQUE_TOTALS[b]-BLOQUE_TOTALS[a]).forEach(b=>{
    const o=document.createElement('option');
    o.value=b; o.textContent=b; sel.appendChild(o);

})();

// ════════════════════════════════════════════
//  FIX 1: ROLE MODAL — index-based, no inline names
// ════════════════════════════════════════════
const _roleMap = {};
let _roleIdx = 0;
function _regRole(com, senator){
  const k = _roleIdx++;
  _roleMap[k] = {com, senator};
  return k;
}
let _roleCtx = {com:'', senator:''};
function openRoleModal(idx){
  const ctx = _roleMap[idx];
  if(!ctx) return;
  _roleCtx = ctx;
  const current = getRole(ctx.com, ctx.senator);
  showModal(`Asignar rol — ${ctx.senator}`,`
    <p style="font-size:12px;color:#6B7280;margin-bottom:4px">Comisión: <strong>${ctx.com}</strong></p>
    ${current?`<p style="font-size:11px;color:#6B7280;margin-bottom:12px">Rol actual: <strong>${current}</strong></p>`:'<p style="font-size:11px;color:#9CA3AF;margin-bottom:12px">Sin rol asignado</p>'}
    <div class="role-select-grid">
      <button class="role-btn pres" onclick="assignRole('Presidente')">Presidente/a</button>
      <button class="role-btn vice" onclick="assignRole('Vicepresidente')">Vicepresidente/a</button>
      <button class="role-btn secr" onclick="assignRole('Secretario/a')">Secretario/a</button>
      <button class="role-btn clear" onclick="assignRole(null)" style="grid-column:1/-1">Quitar rol</button>
    </div>
  `);
}
function assignRole(role){
  setRole(_roleCtx.com, _roleCtx.senator, role);
  document.getElementById('modalOverlay').classList.remove('open');
  renderAll();
}

// ════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════
function getHistory(comision,senator){return RAW_CHANGES.filter(c=>c.comision===comision&&(c.senador===senator||c.reemplaza===senator))}
function getComisionHistory(comision){return RAW_CHANGES.filter(c=>c.comision===comision)}
function labelHtml(tipo){
  const m={'add':'hl-add','replace':'hl-replace','remove':'hl-remove','rewrite':'hl-rewrite'};
  const txt={'add':'Incorporado','replace':'Reemplazo','remove':'Baja','rewrite':'Recomposición'};
  return `<span class="hist-label ${m[tipo]||''}">${txt[tipo]||tipo}</span>`;
}

// ════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════
let currentView='comisiones';
function setView(v,btn){
  currentView=v;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('comisionView').style.display=v==='comisiones'?'block':'none';
  document.getElementById('senadorView').style.display=v==='senadores'?'block':'none';
  document.getElementById('reprView').style.display=v==='repr'?'block':'none';
  renderAll();
}

function renderAll(){
  const search=document.getElementById('searchBox').value.toLowerCase().trim();
  const bloqueFilter=document.getElementById('filterBloque').value;
  const changeFilter=document.getElementById('filterChanges').value;

  let totalVac=0;
  ALL_COMISIONES.forEach(c=>{totalVac+=getVacantes(c.nombre);});
  document.getElementById('statsBar').innerHTML=`
    <div class="stat-card"><div class="stat-n">${ALL_COMISIONES.length}</div><div class="stat-l">comisiones unicamerales</div></div>
    <div class="stat-card"><div class="stat-n">${totalVac}</div><div class="stat-l">vacantes totales</div></div>
    <div class="stat-card"><div class="stat-n">${ALL_COMISIONES.filter(c=>getVacantes(c.nombre)>0).length}</div><div class="stat-l">comisiones con vacantes</div></div>
  `;

  if(currentView==='comisiones') renderComisiones(search,bloqueFilter,changeFilter);
  else if(currentView==='senadores') renderSenadores(search,bloqueFilter);
  else renderRepr();
}

function renderComisiones(search,bloqueFilter,changeFilter){
  // FIX 1: reset role index each render
  _roleIdx = 0;
  Object.keys(_roleMap).forEach(k=>delete _roleMap[k]);

  let list=ALL_COMISIONES.filter(c=>{
    const members=getMembers(c.nombre);
    if(changeFilter==='changed'&&!members.some(m=>m.changed)) return false;
    if(changeFilter==='vacant'&&getVacantes(c.nombre)===0) return false;
    if(bloqueFilter!=='all'&&!members.some(m=>getSenatorBloque(m.name)===bloqueFilter)) return false;
    if(search){
      if(!c.nombre.toLowerCase().includes(search)&&!members.some(m=>m.name.toLowerCase().includes(search))) return false;
    }
    return true;
  });

  const grid=document.getElementById('grid');
  if(!list.length){grid.innerHTML='<div class="empty-state">No se encontraron comisiones con esos criterios.</div>';return;}

  grid.innerHTML=list.map(c=>{
    const members=getMembers(c.nombre);
    const vacantes=getVacantes(c.nombre);
    const countLabel=`${members.length}/${c.cupo}${vacantes>0?` · ${vacantes} vac.`:''}`;

    const memberRows=members.map(m=>{
      const bc=blqColor(getSenatorBloque(m.name));
      const role=getRole(c.nombre,m.name);
      const idx=_regRole(c.nombre,m.name);
      const roleHtml=role
        ?`<button class="member-role role-${role==='Presidente'?'pres':role==='Vicepresidente'?'vice':'secr'}" onclick="openRoleModal(${idx})">${role==='Presidente'?'Pres.':role==='Vicepresidente'?'Vpto.':'Secr.'}</button>`
        :`<button class="role-empty" onclick="openRoleModal(${idx})" title="Asignar rol">+ rol</button>`;
      const badgeHtml=m.changed
        ?`<button class="badge changed" onclick="showMemberHistory(${idx})">DPP-${m.dpp}</button>`
        :`<span class="badge original">original</span>`;
      return `<div class="member-row">
        <span class="bloque-dot" style="background:${bc.dot}" title="${getSenatorBloque(m.name)}"></span>
        <span class="member-name">${m.name}</span>
        ${roleHtml}${badgeHtml}
      </div>`;
    }).join('');

    const vacantRows=Array.from({length:vacantes},(_,i)=>
      `<div class="member-row vacant"><span class="bloque-dot" style="background:#E5E7EB"></span><span class="member-name">Vacante ${i+1}</span><span class="badge vacant-badge">sin designar</span></div>`
    ).join('');

    return `<div class="com-card">
      <div class="card-header" onclick="showComisionHistory('${c.nombre.replace(/'/g,"\\'")}')">
        <div><div class="card-tipo">Unicameral permanente · ${c.cupo} miembros</div><div class="card-name">${c.nombre}</div></div>
        <div class="card-header-right">
          <div class="card-count">${countLabel}</div>
          <button class="card-hist-btn" onclick="event.stopPropagation();showComisionHistory('${c.nombre.replace(/'/g,"\\'")}')">Historial ↗</button>
        </div>
      </div>
      <div class="member-list">${memberRows}${vacantRows}</div>
    </div>`;
  }).join('');
}

// Note: showMemberHistory now takes an idx from _roleMap
function showMemberHistory(idx){
  const ctx=_roleMap[idx];
  if(!ctx){return;}
  const hist=getHistory(ctx.com,ctx.senator);
  const content=hist.length
    ?hist.map(c=>`<div class="hist-entry"><div class="hist-dpp">DPP-${c.dpp}<span class="hist-date">${DPP_DATES[c.dpp]||''}</span></div><div class="hist-change">${labelHtml(c.tipo)}${c.tipo==='replace'?` en reemplazo de ${c.reemplaza}`:''}${c.tipo==='add'?' designado/a':''}${c.tipo==='remove'?' dado/a de baja':''}${c.tipo==='rewrite'?' confirmado/a en recomposición':''}</div></div>`).join('')
    :`<div class="no-hist">Miembro incorporado en la constitución original.</div>`;
  showModal(`${ctx.senator} — ${ctx.com}`,content);
}

function renderSenadores(search,bloqueFilter){
  const allSenators={};
  for(const [comNombre,members] of Object.entries(STATE)){
    if(!ALL_COMISIONES.find(c=>c.nombre===comNombre)) continue;
    for(const m of members){
      if(!allSenators[m.name]) allSenators[m.name]={comisiones:[],bloque:getSenatorBloque(m.name)};
      allSenators[m.name].comisiones.push({com:comNombre,dpp:m.dpp});
    }
  }
  // For senator chips we use comision name directly (safe, no special chars in onclick)
  let names=Object.keys(allSenators).sort((a,b)=>a.localeCompare(b,'es'));
  if(search) names=names.filter(n=>n.toLowerCase().includes(search)||allSenators[n].bloque.toLowerCase().includes(search));
  if(bloqueFilter!=='all') names=names.filter(n=>allSenators[n].bloque===bloqueFilter);

  const grid=document.getElementById('senatorGrid');
  if(!names.length){grid.innerHTML='<div class="empty-state">No se encontraron senadores/as.</div>';return;}

  // Register in a separate senator->hist map
  const senHist={};
  grid.innerHTML=names.map(name=>{
    const d=allSenators[name];
    const bc=blqColor(d.bloque);
    const chips=d.comisiones.map(c=>{
      const k=Object.keys(senHist).length;
      senHist[k]={com:c.com,senator:name};
      return `<button class="chip" onclick="showSenHist(${k})">${c.com}</button>`;
    }).join('');
    return `<div class="senator-card">
      <div class="senator-name">${name}</div>
      <span class="senator-bloque-tag" style="background:${bc.bg};color:${bc.badge}">${d.bloque}</span>
      <div class="senator-chips">${chips}</div>
      <div class="senator-count">${d.comisiones.length} comisión${d.comisiones.length!==1?'es':''}</div>
    </div>`;
  }).join('');
  window._senHist=senHist;
}
function showSenHist(k){
  const ctx=window._senHist[k];
  if(!ctx) return;
  const hist=getHistory(ctx.com,ctx.senator);
  const content=hist.length
    ?hist.map(c=>`<div class="hist-entry"><div class="hist-dpp">DPP-${c.dpp}<span class="hist-date">${DPP_DATES[c.dpp]||''}</span></div><div class="hist-change">${labelHtml(c.tipo)}${c.tipo==='replace'?` en reemplazo de ${c.reemplaza}`:''}${c.tipo==='add'?' designado/a':''}${c.tipo==='remove'?' dado/a de baja':''}${c.tipo==='rewrite'?' confirmado/a en recomposición':''}</div></div>`).join('')
    :`<div class="no-hist">Miembro incorporado en la constitución original.</div>`;
  showModal(`${ctx.senator} — ${ctx.com}`,content);
}

// ════════════════════════════════════════════
//  REPRESENTACIÓN  (FIX 4: mobile-optimized)

function renderRepr(){

  // ── Resumen global ──
  let globalHtml=`<div class="repr-table-wrap"><table class="repr">
    <thead><tr>
      <th>Bloque</th>
      <th class="num">Senadores</th>
      <th class="num">% cámara</th>
      <th class="num">Com. de 17</th>
      <th class="num">Com. de 19</th>
    </tr></thead><tbody>`;
  for(const b of bloques){
    const total=BLOQUE_TOTALS[b];
    const pct=(total/TOTAL_SENATORS*100).toFixed(2);
    const exp17=(total/TOTAL_SENATORS*17).toFixed(2);
    const exp19=(total/TOTAL_SENATORS*19).toFixed(2);
    const bc=blqColor(b);
    globalHtml+=`<tr>
      <td><div class="bloque-name-cell"><span class="blq-dot-table" style="background:${bc.dot}"></span>${b}</div></td>
      <td class="num">${total}</td>
      <td class="num">${pct}%</td>
      <td class="num" style="background:#F0F7FF;color:#1A4A70">${exp17}</td>
      <td class="num" style="background:#F0FDF4;color:#2E5018">${exp19}</td>
    </tr>`;
  }
  globalHtml+=`</tbody></table></div>`;

  // ── Tabla de doble entrada (FIX 4: proper mobile classes) ──
  const shortName = n => n
    .replace(/^De las? /i,'').replace(/^De los? /i,'').replace(/^De /i,'')
    .replace('Economías Regionales, Economía Social, Micro, Pequeña y Mediana Empresa','Ec. Regionales')
    .replace('Sistemas, Medios de Comunicación y Libertad de Expresión','Sistemas y Medios')
    .replace('Coparticipación Federal de Impuestos','Coparticipación')
    .replace('Infraestructura, Vivienda y Transporte','Infraestructura')
    .replace('Asuntos Administrativos y Municipales','Asuntos Adm.')
    .replace('Asuntos Constitucionales','Constitucionales')
    .replace('Seguridad Interior y Narcotráfico','Seg. Interior')
    .replace('Relaciones Exteriores y Culto','RR.EE. y Culto')
    .replace('Población y Desarrollo Humano','Pob. y Des. Humano')
    .replace('Trabajo y Previsión Social','Trabajo')
    .replace('Minería, Energía y Combustibles','Minería')
    .replace('Agricultura, Ganadería y Pesca','Agricultura')
    .replace('Ambiente y Desarrollo Sustentable','Ambiente')
    .replace('Economía Nacional e Inversión','Ec. Nacional')
    .replace('Derechos y Garantías','Der. y Garantías')
    .replace('Defensa Nacional','Defensa')
    .replace('Educación y Cultura','Educación')
    .replace('Industria y Comercio','Industria')
    .replace('Legislación General','Legislación')
    .replace('Ciencia y Tecnología','Ciencia')
    .replace('Acuerdos','Acuerdos')
    .replace('Turismo','Turismo')
    .replace('Salud','Salud')
    .replace('Deporte','Deporte');

  let crossHtml=`<div class="cross-wrap"><table class="cross-table">
    <thead><tr>
      <th class="blq-col">Bloque</th>
      ${ALL_COMISIONES.map(c=>`<th class="com-col"><span>${shortName(c.nombre)}</span></th>`).join('')}
    </tr></thead><tbody>`;

  for(const b of bloques){
    const bc=blqColor(b);
    crossHtml+=`<tr>
      <td class="blq-name" style="background:${bc.bg}">
        <div class="bloque-name-cell"><span class="blq-dot-table" style="background:${bc.dot}"></span>${b}</div>
      </td>`;
    for(const c of ALL_COMISIONES){
      const act=(STATE[c.nombre]||[]).filter(m=>getSenatorBloque(m.name)===b).length;
      crossHtml+=`<td class="val" style="font-weight:${act>0?'600':'400'};color:${act>0?'var(--gray-text)':'#D1D5DB'}">${act>0?act:'—'}</td>`;
    }
    crossHtml+=`</tr>`;
  }
  crossHtml+=`</tbody></table></div>`;

  div.innerHTML=`
    <div style="font-size:12px;color:#6B7280;margin-bottom:14px;margin-top:4px">

// ════════════════════════════════════════════
//  MODAL
// ════════════════════════════════════════════
function showModal(title,contentHtml){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalContent').innerHTML=contentHtml;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(e){
  if(!e||e.target===document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
}
function showComisionHistory(comision){
  const hist=getComisionHistory(comision);
  const content=hist.length
    ?hist.map(c=>`<div class="hist-entry"><div class="hist-dpp">DPP-${c.dpp}<span class="hist-date">${DPP_DATES[c.dpp]||''}</span></div><div class="hist-change">${labelHtml(c.tipo)}${c.tipo==='add'?`<strong>${c.senador}</strong>`:''}${c.tipo==='replace'?`<strong>${c.reemplaza}</strong> → <strong>${c.senador}</strong>`:''}${c.tipo==='remove'?`Baja: <strong>${c.senador}</strong>`:''}${c.tipo==='rewrite'?`Recomposición: <strong>${c.senador}</strong>`:''}</div></div>`).join('')
    :`<div class="no-hist">Sin movimientos registrados.</div>`;
  showModal(`Historial — ${comision}`,content);
}
